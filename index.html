<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fleet Inspector - Mobile Access</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FIREBASE LIBRARIES -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-body: #171b21;
            --bg-card: #22272d;
            --bg-header: #1d2127;
            
            --text-primary: #ffffff;
            --text-secondary: #94a0b0;
            --text-muted: #6b7280;
            
            --accent-green: #22c55e;
            --accent-green-dark: #16a34a;
            --accent-teal: #06b6d4;
            --accent-blue: #3b82f6;
            
            --status-red: #ef4444;
            --status-yellow: #f59e0b;
            
            --border-color: #30363d;
            
            --font-main: 'Inter', sans-serif;
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background-color: var(--bg-header);
            padding: 1.2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-teal));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 14px;
        }
        
        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* --- Main Container --- */
        main {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .view-section {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.3s ease;
        }
        
        .view-section.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Forms & Inputs (Mobile Optimized) --- */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-box {
            width: 100%;
            background-color: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-primary);
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: monospace;
        }
        
        .input-box:focus {
            border-color: var(--accent-teal);
        }

        .input-box.text-input {
            font-family: var(--font-main);
            font-size: 1rem;
        }

        /* --- Buttons --- */
        .btn-solid {
            background: var(--accent-green);
            border: none;
            color: #000;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.2s;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .btn-solid:hover, .btn-solid:active {
            background: var(--accent-green-light);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            margin-top: 1rem;
        }

        /* --- Vehicle Info Card --- */
        .vehicle-info {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .v-plate {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-teal);
            font-family: monospace;
        }
        
        .v-details {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* --- Touch-Friendly Checklist --- */
        .checklist-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .checklist-header {
            background-color: var(--bg-header);
            padding: 0.75rem 1rem;
            font-weight: 700;
            color: var(--accent-teal);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        .checklist-header.is-nogo {
            color: var(--status-red);
            border-left: 4px solid var(--status-red);
        }

        .check-title {
            padding: 1rem;
            font-size: 0.95rem;
            line-height: 1.4;
            border-bottom: 1px solid var(--border-color);
        }

        .check-action-text {
            display: block;
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--status-yellow);
        }

        .touch-toggles {
            display: flex;
            width: 100%;
        }

        .touch-toggle-label {
            flex: 1;
            text-align: center;
            position: relative;
            cursor: pointer;
        }

        .touch-toggle-label input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .toggle-btn {
            display: block;
            padding: 1rem;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        /* Pass Styling */
        .touch-toggle-label input[value="PASS"]:checked ~ .toggle-btn {
            background: rgba(34, 197, 94, 0.2);
            color: var(--accent-green);
            box-shadow: inset 0 -3px 0 var(--accent-green);
        }

        /* Fail Styling */
        .touch-toggle-label input[value="FAIL"]:checked ~ .toggle-btn {
            background: rgba(239, 68, 68, 0.2);
            color: var(--status-red);
            box-shadow: inset 0 -3px 0 var(--status-red);
        }

        /* --- Custom Alert/Loader --- */
        .system-msg {
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1rem;
            font-weight: 600;
            display: none;
        }
        .system-msg.error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--status-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }
        .system-msg.success {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: block;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent-teal);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-solid.loading .loader { display: inline-block; }
        .btn-solid.loading .btn-text { display: none; }

    </style>
</head>
<body>

    <header>
        <div class="header-logo">F</div>
        <div class="header-title">INSPECTOR PORTAL</div>
    </header>

    <main>
        
        <!-- View 1: Lookup Vehicle -->
        <div id="view-lookup" class="view-section active">
            <div class="card">
                <h2 style="font-size: 1.2rem; margin-bottom: 0.5rem;">Find Vehicle</h2>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.9rem;">Enter the license plate to pull up the vehicle profile for inspection.</p>
                
                <div id="lookupMsg" class="system-msg"></div>

                <div class="form-group">
                    <label>License Plate</label>
                    <input type="text" id="lookupPlate" class="input-box" placeholder="e.g. XW-294-Q" autocomplete="off" autocorrect="off" autocapitalize="off">
                </div>
                
                <button class="btn-solid" id="btnLookup" onclick="lookupVehicle()">
                    <span class="btn-text">Search Database</span>
                    <div class="loader"></div>
                </button>
            </div>
        </div>

        <!-- View 2: Inspection Form -->
        <div id="view-form" class="view-section">
            
            <div class="vehicle-info">
                <div>
                    <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Inspecting</div>
                    <div class="v-plate" id="infoPlate">--</div>
                </div>
                <div class="v-details">
                    <div id="infoBrand" style="font-weight: 600; color: var(--text-primary);">--</div>
                    <div id="infoYear">--</div>
                </div>
            </div>

            <div class="card" style="padding-bottom: 0.5rem;">
                <div class="form-group">
                    <label>Inspector ID / Name</label>
                    <input type="text" id="inspectorName" class="input-box text-input" placeholder="e.g. John Doe">
                </div>
                <div class="form-group">
                    <label>Current Driver Name</label>
                    <input type="text" id="driverName" class="input-box text-input" placeholder="e.g. Mike Wheeler">
                </div>
            </div>

            <h3 style="font-size: 1rem; color: var(--text-secondary); text-transform: uppercase; margin-top: 0.5rem;">Inspection Checklist</h3>
            
            <form id="inspectionForm">
                <div id="checklistWrapper"></div>
                
                <!-- Manual Next Due Date (Hidden initially) -->
                <div id="failDateWrapper" class="card" style="display: none; border-color: var(--status-red); margin-top: 1rem;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="color: var(--status-red);">Inspection Failed. Set Follow-up Date:</label>
                        <input type="date" id="manualNextDueDate" class="input-box text-input" required>
                    </div>
                </div>

                <div style="margin-top: 2rem; margin-bottom: 2rem;">
                    <button type="submit" class="btn-solid" id="btnSubmit">
                        <span class="btn-text">Submit Inspection</span>
                        <div class="loader"></div>
                    </button>
                    <button type="button" class="btn-outline" onclick="cancelInspection()">Cancel / Back</button>
                </div>
            </form>
        </div>

        <!-- View 3: Success Screen -->
        <div id="view-success" class="view-section" style="align-items: center; justify-content: center; flex: 1; text-align: center;">
            <div style="width: 80px; height: 80px; background: rgba(34, 197, 94, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent-green); margin-bottom: 1.5rem;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text-primary);">Submitted for Approval</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Your inspection report has been sent to the Manager Dashboard for review and approval.</p>
            
            <button class="btn-solid" onclick="switchView('view-lookup'); document.getElementById('lookupPlate').value=''; document.getElementById('lookupPlate').focus();">Scan Next Vehicle</button>
        </div>

    </main>

    <script>
        // =========================================================================
        // FIREBASE CONFIGURATION (Syncs with the main dashboard)
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBdvz_Dko_A5HxmWGbFYJ2zak_cicn3pCw",
            authDomain: "fleet-compliance-1c3c8.firebaseapp.com",
            projectId: "fleet-compliance-1c3c8",
            storageBucket: "fleet-compliance-1c3c8.firebasestorage.app",
            messagingSenderId: "494902372533",
            appId: "1:494902372533:web:a36e0f1b507dfc3b73f6fc"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // =========================================================================
        // GLOBAL STATE & DEFINITIONS
        // =========================================================================
        let currentVehicle = null;

        const checklistDefinition = [
            { id: 'I', title: 'TIRES & SPARES', isHeader: true, isNoGo: true, note: 'NO-GO ITEM (ENTRY DENIED)' },
            { id: '1.1', title: 'Spare tire: Available, correct size, not flat/torn.', action: 'Deny Entry.' },
            { id: '1.2', title: 'Tire direction: Installed correctly (Outside/Inside).', action: 'Deny Entry.' },
            { id: '1.3', title: 'Synchronization: 4 main tires of same type.', action: 'Deny Entry.' },
            { id: '1.4', title: 'Wear & Pressure: Not overly worn, evenly inflated.', action: '' },
            { id: 'II', title: 'BODYWORK & LEAKS', isHeader: true },
            { id: '2.1', title: 'Bodywork: No temporary patches, doors/hood close tightly.', action: 'Issue Warning.' },
            { id: '2.2', title: 'Fluid leaks: No engine oil or coolant dripping.', action: 'Deny Entry (LOPC/Fire Risk).' },
            { id: '2.3', title: 'Lights & Glass: Windshield intact. Headlights, signals work.', action: 'Test lights.' },
            { id: 'III', title: 'DRIVER & INFORMATION', isHeader: true },
            { id: '3.1', title: 'Safety shoes: Driver wears safety shoes. NO flip-flops.', action: 'Require change to enter.' },
            { id: '3.2', title: 'Maintenance log: Logbook/history available in vehicle.', action: 'Report to FMD.' },
            { id: '3.3', title: 'Emergency Info: 24/7 emergency & insurance hotlines displayed.', action: 'Require immediate sticker.' },
            { id: 'IV', title: 'CABIN SAFETY & MONITORING', isHeader: true },
            { id: '4.1', title: 'Seatbelt: Fully functional, driver wearing it.', action: 'Suspend, issue LSR violation.' },
            { id: '4.2', title: 'Dashcam: Dual dashcam (front/cabin) operating.', action: '' },
            { id: '4.3', title: 'GPS System: Tracking operational for speed monitoring.', action: '' }
        ];

        // =========================================================================
        // UI HELPERS
        // =========================================================================
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.innerText = text;
            el.className = `system-msg ${type}`;
        }

        function hideMsg(id) {
            document.getElementById(id).style.display = 'none';
        }

        function formatDateSafe(dateObj) {
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const dd = String(dateObj.getDate()).padStart(2, '0');
            const mmm = months[dateObj.getMonth()];
            const yy = String(dateObj.getFullYear()).slice(-2);
            return `${dd}-${mmm}-${yy}`;
        }

        // =========================================================================
        // BUILD MOBILE CHECKLIST
        // =========================================================================
        function buildMobileChecklist() {
            const container = document.getElementById('checklistWrapper');
            let html = '';
            
            checklistDefinition.forEach(item => {
                if (item.isHeader) {
                    html += `
                        <div class="checklist-header ${item.isNoGo ? 'is-nogo' : ''}">
                            ${item.id}. ${item.title}
                            ${item.note ? `<div style="font-size: 0.75rem; font-weight: normal; margin-top: 4px; color: var(--status-red);">${item.note}</div>` : ''}
                        </div>
                    `;
                } else {
                    html += `
                        <div class="checklist-item">
                            <div class="check-title">
                                <strong>${item.id}</strong> - ${item.title}
                                ${item.action ? `<span class="check-action-text">Action: ${item.action}</span>` : ''}
                            </div>
                            <div class="touch-toggles">
                                <label class="touch-toggle-label">
                                    <input type="radio" name="status-${item.id}" value="PASS" checked onchange="checkFailState()">
                                    <span class="toggle-btn">PASS</span>
                                </label>
                                <label class="touch-toggle-label">
                                    <input type="radio" name="status-${item.id}" value="FAIL" onchange="checkFailState()">
                                    <span class="toggle-btn">FAIL</span>
                                </label>
                            </div>
                        </div>
                    `;
                }
            });
            container.innerHTML = html;
        }

        // Monitors the checklist. If any item is marked FAIL, it reveals the mandatory Follow-Up Date picker
        function checkFailState() {
            let isFailed = false;
            checklistDefinition.filter(i => !i.isHeader).forEach(item => {
                const radios = document.getElementsByName(`status-${item.id}`);
                for (let r of radios) {
                    if (r.checked && r.value === 'FAIL') isFailed = true;
                }
            });
            
            const dateWrapper = document.getElementById('failDateWrapper');
            const dateInput = document.getElementById('manualNextDueDate');
            
            if (isFailed) {
                dateWrapper.style.display = 'block';
                dateInput.setAttribute('required', 'true');
            } else {
                dateWrapper.style.display = 'none';
                dateInput.removeAttribute('required');
                dateInput.value = '';
            }
        }

        // =========================================================================
        // APP LOGIC
        // =========================================================================

        async function lookupVehicle() {
            const plateInput = document.getElementById('lookupPlate').value.trim().toUpperCase();
            if (!plateInput) {
                showMsg('lookupMsg', 'Please enter a valid license plate.', 'error');
                return;
            }

            const btn = document.getElementById('btnLookup');
            btn.classList.add('loading');
            hideMsg('lookupMsg');

            try {
                const doc = await db.collection("vehicles").doc(plateInput).get();
                
                if (doc.exists) {
                    currentVehicle = doc.data();
                    
                    // Populate Form View
                    document.getElementById('infoPlate').innerText = currentVehicle.Plate;
                    document.getElementById('infoBrand').innerText = `${currentVehicle.Brand || ''} ${currentVehicle.Model || ''}`;
                    document.getElementById('infoYear').innerText = `Year: ${currentVehicle.Year || 'N/A'}`;
                    
                    document.getElementById('driverName').value = currentVehicle.Driver || '';
                    
                    // Keep inspector name if they already typed it once
                    if (!document.getElementById('inspectorName').value) {
                        document.getElementById('inspectorName').value = '';
                    }

                    document.getElementById('inspectionForm').reset();
                    checkFailState(); // reset fail box
                    
                    switchView('view-form');
                } else {
                    showMsg('lookupMsg', 'Vehicle not found in database.', 'error');
                }
            } catch (error) {
                showMsg('lookupMsg', 'Network error. Check connection.', 'error');
                console.error("Lookup error:", error);
            } finally {
                btn.classList.remove('loading');
            }
        }

        function cancelInspection() {
            currentVehicle = null;
            document.getElementById('lookupPlate').value = '';
            switchView('view-lookup');
        }

        document.getElementById('inspectionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!currentVehicle) return;

            const btn = document.getElementById('btnSubmit');
            btn.classList.add('loading');

            const inspector = document.getElementById('inspectorName').value.trim();
            const driver = document.getElementById('driverName').value.trim();
            const today = new Date();
            
            let isFailed = false;
            const results = [];
            
            // Gather checklist results
            checklistDefinition.filter(item => !item.isHeader).forEach(item => {
                const radios = document.getElementsByName(`status-${item.id}`);
                let val = 'PASS';
                for(let r of radios) { if(r.checked) val = r.value; }
                if(val === 'FAIL') isFailed = true;
                results.push({ id: item.id, status: val });
            });

            // Prepare updated vehicle document
            const updatedVehicle = { ...currentVehicle };
            updatedVehicle.Driver = driver;
            updatedVehicle.LastInspected = formatDateSafe(today);
            
            if (isFailed) {
                updatedVehicle.Status = 'Failed';
                // Use the manual date provided by the inspector
                const manualDateVal = document.getElementById('manualNextDueDate').value;
                const parts = manualDateVal.split('-');
                const nextDue = new Date(parts[0], parts[1] - 1, parts[2]);
                updatedVehicle.NextDue = formatDateSafe(nextDue);
            } else {
                updatedVehicle.Status = 'Passed';
                // Auto-set +6 months
                const nextDue = new Date(today);
                nextDue.setMonth(today.getMonth() + 6);
                updatedVehicle.NextDue = formatDateSafe(nextDue);
            }

            // Append to inspection history log
            if (!updatedVehicle.inspections) updatedVehicle.inspections = [];
            updatedVehicle.inspections.push({
                date: today.toISOString(),
                inspector: inspector,
                driver: driver,
                status: isFailed ? 'Failed' : 'Passed',
                details: results
            });

            // Add a timestamp for the approval queue
            updatedVehicle.pendingSubmissionTime = today.toISOString();

            try {
                // Write to the "Waiting Room" bucket instead of live vehicles
                await db.collection("pending_inspections").doc(updatedVehicle.Plate).set(updatedVehicle);
                switchView('view-success');
            } catch (error) {
                alert("Failed to submit for approval. Ensure you have an internet connection. Error: " + error.message);
            } finally {
                btn.classList.remove('loading');
            }
        });

        // Init
        document.addEventListener("DOMContentLoaded", () => {
            buildMobileChecklist();
            
            // Simple enter key listener for search box
            document.getElementById('lookupPlate').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    lookupVehicle();
                }
            });
        });

    </script>
</body>
</html>
